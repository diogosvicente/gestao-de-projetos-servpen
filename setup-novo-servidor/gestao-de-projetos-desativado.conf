# /etc/apache2/conf-available/gestao-de-projetos-desativado.conf
#
# Vhost "desativado" — substitui o gestao-de-projetos.conf normal quando você
# quer DESATIVAR o acesso pela URL `/gestao-de-projetos/...` neste servidor,
# mas SEM mexer nos arquivos do app nem no banco.
#
# Quando ativo, qualquer acesso a /gestao-de-projetos[/...] retorna HTTP 410
# (Gone) servindo o arquivo HTML `/var/www/html/sistema-desativado.html` que
# explica que o sistema mudou de endereço.
#
# ATIVAR (desabilita o app, mostra a página):
#   # 1) Copia o HTML pro DocumentRoot do Apache:
#   sudo cp /var/www/html/gestao_de_projetos/setup-novo-servidor/sistema-desativado.html \
#           /var/www/html/sistema-desativado.html
#   sudo chown www-data:www-data /var/www/html/sistema-desativado.html
#
#   # 2) Copia este conf pro Apache + alterna:
#   sudo cp /var/www/html/gestao_de_projetos/setup-novo-servidor/gestao-de-projetos-desativado.conf \
#           /etc/apache2/conf-available/gestao-de-projetos-desativado.conf
#   sudo a2disconf gestao-de-projetos
#   sudo a2enconf gestao-de-projetos-desativado
#   sudo systemctl reload apache2
#
#   # 3) Opcional — para o Streamlit pra liberar CPU/RAM:
#   sudo systemctl stop gestao-de-projetos
#   sudo systemctl disable gestao-de-projetos
#
# REVERTER (reativa o app normalmente):
#   sudo a2disconf gestao-de-projetos-desativado
#   sudo a2enconf gestao-de-projetos
#   sudo systemctl enable gestao-de-projetos
#   sudo systemctl start gestao-de-projetos
#   sudo systemctl reload apache2
#
# Por que arquivo externo em vez de string inline no ErrorDocument:
#   ErrorDocument inline com HTML longo + caracteres acentuados quebra:
#   o Apache não enviava `charset=utf-8` no header e o browser caía em
#   Latin-1 (mojibake "ðŸšš Sistema movido"). Servir o HTML como arquivo
#   .html no DocumentRoot resolve — o Apache lê o mime.types
#   (text/html charset=utf-8 já é default em Ubuntu/Debian modernos).
#
# Por que 410 (Gone) e não 404 ou Redirect:
#   410 = "esse recurso existiu mas foi removido permanentemente".
#   Crawlers/proxies tratam diferente de 404. Redirect 302 levaria o
#   user direto, mas perderíamos a chance de mostrar uma página
#   explicando que o endereço mudou.

# Página servida quando o status é 410 (servida do DocumentRoot do Apache).
ErrorDocument 410 /sistema-desativado.html

# Garantia explícita do charset (caso o mime.types do servidor não tenha
# UTF-8 default — em alguns Debian antigos não tem).
<Files "sistema-desativado.html">
    <IfModule mod_headers.c>
        Header set Content-Type "text/html; charset=utf-8"
    </IfModule>
</Files>

<IfModule mod_alias.c>
    # Captura /gestao-de-projetos E /gestao-de-projetos/qualquer/coisa.
    # Retorna 410 Gone — Apache vai buscar o ErrorDocument acima.
    RedirectMatch 410 ^/gestao-de-projetos(/.*)?$
</IfModule>
